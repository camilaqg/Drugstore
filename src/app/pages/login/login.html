<p>login works!</p><h2>Login</h2>

<form (ngSubmit)="login()">

  <label>User:</label>
  <input 
    type="text" 
    [(ngModel)]="username" 
    name="username"
    required
  />

  <br><br>

  <label>Password:</label>
  <input 
    type="password" 
    [(ngModel)]="password" 
    name="password"
    required
  />

  <br><br>

  <button type="submit">Login</button>

</form>

@if (error) {
  <p style="color:red;">Invalid credentials</p>
}

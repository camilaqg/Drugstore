<div class="container">

    <!-- Lado izquierdo -->
    <div class="left">
        <div class="card">

            <div class="logo">
                <img src="iconos/flor.png" alt="flor">
            </div>

            <h2>Drogueria Pili</h2>
            <p>SISTEMA DE GESTION</p>
        </div>
    </div>

    <!-- APARECE EN EL LADO DERECHO -->
    <div class="right">
        <div class="register-box">
            <h1>Crear cuenta</h1>

            <form (ngSubmit)="register()">

                <!-- NOMBRE -->
                <div class="input-group">
                    <label>Nombre completo</label>
                    <input type="text" [(ngModel)]="name" name="name" placeholder="Ingrese su nombre" required>
                </div>

                <!-- CORREO-->
                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Ingrese su correo" required>
                </div>

                <!-- USUARIO-->
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" [(ngModel)]="username" name="username" placeholder="Ingrese su usuario" required>
                </div>

                <!-- CONTRASEÑA-->
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Ingrese su contraseña"
                        required>

                    <!-- VALIDACION PARA LOS CARACTERES-->
                    @if (password.length < 6 && password) { <p
                        style="color:#0f0f0f; text-align:center; margin-top:5px;">
                        *Mínimo 6 caracteres*
                        </p>
                        }
                </div>

                <!-- Confirmar contraseña -->
                <div class="input-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Repita su contraseña" required>

                    <!--VALIDACIÓN COINCIDENCIA EN LAS CONTRASEÑAS -->
                    @if (password !== confirmPassword && confirmPassword) {
                    <p style="color:#0f0f0f; text-align:center; margin-top:5px;">
                        *Las contraseñas no coinciden*
                    </p>
                    }
                </div>

                <!-- Botón -->
                <button type="submit">Registrarse</button>

            </form>

        </div>
    </div>
